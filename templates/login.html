<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>登录 - IT运维综合管理系统</title>
 <script>
 (function() {
 var savedTheme = localStorage.getItem('appTheme') || 'light';
 document.documentElement.setAttribute('data-theme', savedTheme);
 document.documentElement.setAttribute('data-bs-theme', savedTheme);
 })();
 </script>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
 <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
 <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
 <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-pages.css') }}">
 <style>
 /* === 登录页：复用主题变量与 typography token，与登录后界面 100% 一致 === */
 body.login-page {
 background: var(--background);
 min-height:100vh;
 display: flex; align-items: center; justify-content: center;
 padding:20px;
 }
 .login-shell {
 width:100%;
 max-width:920px;
 background: var(--surface);
 border:1px solid var(--border-soft);
 border-radius:24px;
 box-shadow: var(--shadow-lg);
 overflow: hidden;
 display: grid;
 grid-template-columns: 1fr 1fr;
 min-height:520px;
 }
 .login-brand {
 padding:48px 40px;
 background:
 radial-gradient(circle at 80% 20%, var(--primary-soft), transparent 60%),
 radial-gradient(circle at 20% 80%, var(--primary-soft), transparent 60%),
 linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
 color: var(--text-on-primary);
 display: flex; flex-direction: column; justify-content: space-between;
 position: relative;
 }
 .login-brand::after {
 content: '';
 position: absolute; inset: 0;
 background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.08) 1px, transparent 0);
 background-size: 24px 24px;
 pointer-events: none;
 }
 .login-brand-icon {
 width: 64px; height: 64px; border-radius: 18px;
 background: rgba(255,255,255,.18);
 border: 1px solid rgba(255,255,255,.22);
 display: inline-flex; align-items: center; justify-content: center;
 font-size: var(--fs-3xl);
 }
 .login-brand-name { font-size: var(--fs-3xl); font-weight: var(--fw-bold); margin-top: 18px; letter-spacing: 0; line-height: var(--lh-tight); }
 .login-brand-sub { opacity: .85; font-size: var(--fs-code); margin-top: 6px; }
 .login-brand-tagline { font-size: var(--fs-sm); opacity: .75; margin-top: 16px; line-height: var(--lh-base); }
 .login-brand-version {
 display: inline-block; padding: 4px 12px; border-radius: var(--radius-pill);
 background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.22);
 font-size: var(--fs-sm); width: fit-content;
 }
 .login-form { padding: 48px 40px; display: flex; flex-direction: column; justify-content: center; }
 .login-form h3 { margin: 0 0 4px; font-size: var(--fs-3xl); font-weight: var(--fw-bold); color: var(--text-primary); }
 .login-form .sub { color: var(--text-muted); font-size: var(--fs-code); margin-bottom: 28px; }
 .login-form .form-label { font-weight: var(--fw-semibold); font-size: var(--fs-code); color: var(--text-body); margin-bottom: 6px; }
 .login-form .form-control {
 background: var(--surface-strong); border: 1px solid var(--border-soft);
 color: var(--text-primary); border-radius: var(--radius-sm);
 padding: 10px 14px; font-size: var(--fs-base);
 }
 .login-form .form-control:focus {
 border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft);
 background: var(--surface-strong);
 }
 .login-form .btn-primary {
 background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
 border: none; border-radius: var(--radius-sm);
 padding: 11px; font-weight: var(--fw-semibold); font-size: var(--fs-md);
 margin-top: 8px; box-shadow: 0 8px 24px color-mix(in srgb, var(--primary) 30%, transparent);
 }
 .login-form .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 28px color-mix(in srgb, var(--primary) 40%, transparent); }
 .login-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; font-size: var(--fs-sm); color: var(--text-muted); }
 .login-meta .theme-toggle-mini {
 background: transparent; border: 1px solid var(--border-soft); color: var(--text-body);
 border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: var(--fs-sm);
 }
 .login-meta .theme-toggle-mini:hover { background: var(--surface-muted); }
 @media (max-width:768px) {
 .login-shell { grid-template-columns: 1fr; max-width: 420px; }
 .login-brand { display: none; }
 }
 </style>
</head>
<body class="login-page">
 <div class="login-shell">
 <div class="login-brand">
 <div>
 <div class="login-brand-icon"><i class="bi-hdd-network"></i></div>
 <div class="login-brand-name">IT运维综合管理系统</div>
 </div>
 <div>
 </div>
 </div>

 <div class="login-form">
 <h3>欢迎登录</h3>
 <p class="sub">请输入您的账号信息继续</p>

 {% with messages = get_flashed_messages(with_categories=true) %}
 {% if messages %}
 {% for category, message in messages %}
 <div class="alert alert-{{ category if category in ['success','danger','warning','info'] else 'info' }} alert-dismissible fade show py-2 small">
 {{ message }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
 </div>
 {% endfor %}
 {% endif %}
 {% endwith %}

 <form method="post">
 <div class="mb-3">
 <label class="form-label">用户名</label>
 <input type="text" name="username" class="form-control" required autofocus placeholder="请输入用户名">
 </div>
 <div class="mb-3">
 <label class="form-label">密码</label>
 <input type="password" name="password" class="form-control" required placeholder="请输入密码">
 </div>
 <button type="submit" class="btn btn-primary w-100">登录</button>
 </form>

 <div class="login-meta">
 <span>默认账号: admin / admin123</span>
 <button class="theme-toggle-mini" type="button" onclick="toggleTheme()">
 <i class="bi-moon-stars" id="themeToggleIcon"></i> <span id="themeToggleText">深色模式</span>
 </button>
 </div>
 </div>
 </div>

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
 <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
