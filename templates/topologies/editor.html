{% extends "base.html" %}
{% block title %}在线拓扑编辑器 - IT运维综合管理系统{% endblock %}
{% block content %}
<style>
.topo-editor {
    height: calc(100vh - 108px);
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border-color, #dee2e6);
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
}
.topo-editor-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid #dee2e6;
    background: var(--card-bg, #f8f9fa);
    flex-wrap: wrap;
}
.topo-editor-bar .form-control,
.topo-editor-bar .form-select { font-size: 0.875rem; }
.topo-editor iframe {
    flex: 1 1 auto;
    width: 100%;
    border: 0;
    min-height: 0;
}
#saveStatus { min-width: 120px; font-size: 0.8rem; }
.export-progress {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid #dee2e6; border-top-color: #0d6efd;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 4px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
<div class="topo-editor position-relative">
    <div class="topo-editor-bar">
        <a href="{{ url_for('topology.topology_list') }}" class="btn btn-sm btn-outline-secondary" title="返回列表">
            <i class="bi-arrow-left"></i>
        </a>
        <input id="topoName" class="form-control form-control-sm" style="max-width:240px" placeholder="拓扑图名称 *">
        <select id="topoCustomer" class="form-select form-select-sm" style="max-width:180px">
            <option value="">不关联客户</option>
            {% for c in all_customers %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
        </select>
        <select id="topoRegion" class="form-select form-select-sm" style="max-width:140px">
            <option value="">不关联地区</option>
            {% for r in regions %}<option value="{{ r.id }}">{{ r.name }}</option>{% endfor %}
        </select>
        <input id="topoDesc" class="form-control form-control-sm flex-grow-1" placeholder="描述（可选）" style="min-width:120px">
        <span id="saveStatus" class="text-muted"></span>
        {% if has_perm('topology:add') or has_perm('topology:edit') %}
        <button id="btnSave" class="btn btn-sm btn-primary"><i class="bi-save"></i> 保存</button>
        {% endif %}
        <div class="dropdown">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                <i class="bi-download"></i> 导出
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item export-item" href="#" data-fmt="svg"><i class="bi-file-earmark-code"></i> SVG 矢量图</a></li>
                <li><a class="dropdown-item export-item" href="#" data-fmt="pdf"><i class="bi-file-earmark-pdf"></i> PDF 文档</a></li>
                <li><a class="dropdown-item export-item" href="#" data-fmt="vsdx"><i class="bi-file-earmark-break"></i> Visio (VSDX)</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item export-item" href="#" data-fmt="png"><i class="bi-file-earmark-image"></i> PNG 图片</a></li>
            </ul>
        </div>
    </div>
    <iframe id="drawioFrame"
            src="{{ url_for('static', filename='vendor/drawio/index.html') }}?embed=1&proto=json&spin=1&lang=zh&sidebar=1&math=0&test=1{% if clibs %}&clibs={{ clibs }}{% endif %}{% if import_url and import_type == 'visio' %}&url={{ import_url }}{% endif %}"
            allow="clipboard-read; clipboard-write"></iframe>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var DIAGRAM_ID = {{ diagram_id | tojson }};
    var IMPORT_URL = {{ import_url|tojson if import_url else 'null' }};
    var IMPORT_TYPE = {{ import_type|tojson if import_type else 'null' }};
    var IMPORT_NAME = {{ import_name|tojson if import_name else 'null' }};
    var IMPORT_CUSTOMER = {{ import_customer_id|tojson if import_customer_id else 'null' }};
    var IMPORT_REGION = {{ import_region_id|tojson if import_region_id else 'null' }};
    var STENCIL_URLS = {{ stencil_urls|tojson }};
    var iframe = document.getElementById('drawioFrame');
    var pendingExport = null;       // 当前正在处理的导出格式
    var exportQueue = [];           // 待处理导出队列
    var exportTotal = 0;            // 本次导出总数（用于进度显示）
    var SAVE_FLAG = '__save__';     // 保存标记：用 export xml 取 XML 后存库（非真正的导出）

    function post(msg) { iframe.contentWindow.postMessage(JSON.stringify(msg), '*'); }

    // ====== drawio postMessage 通信 ======
    window.addEventListener('message', function(event) {
        var msg = event.data;
        if (typeof msg === 'string') { try { msg = JSON.parse(msg); } catch (e) { return; } }
        if (!msg || !msg.event) return;

        if (msg.event === 'init') {
            onDrawioReady();
        } else if (msg.event === 'save') {
            doSave(msg.xml);
        } else if (msg.event === 'export') {
            handleExport(msg);
        }
    });

    function onDrawioReady() {
        // drawio 默认 Editor.useCanvasForExport=false，png 导出会走 EXPORT_URL 服务端
        // （EXPORT_URL 是占位符 'REPLACE_WITH_YOUR_IMAGE_SERVER'，请求无效 URL 报 u.substring 错误）。
        // 改为 true 用客户端 canvas 导出，避免依赖外部导出服务器。
        try { iframe.contentWindow.Editor.useCanvasForExport = true; } catch (e) { /* ignore */ }

        // [诊断] 捕获 drawio 内部错误（drawio 用 ErrorDialog 显示，console 默认看不到堆栈）
        // 拿到 u.substring 的真正触发点后删除
        try {
            var w = iframe.contentWindow;
            w.onerror = function(msg, src, line, col, err) {
                console.error('[topo-err] onerror:', msg, '@', src + ':' + line + ':' + col,
                    err && err.stack ? '\n' + err.stack : '');
                return false;
            };
            w.alert = function(m) {
                console.error('[topo-err] alert:', m, '\n堆栈:', new Error().stack);
            };
            if (w.ErrorDialog) {
                var _ED = w.ErrorDialog;
                w.ErrorDialog = function(editorUi, title, message) {
                    console.error('[topo-err] ErrorDialog:', title, '|', message, '\n堆栈:', new Error().stack);
                    return _ED.apply(this, arguments);
                };
            }
        } catch (e) { console.error('[topo-err] 诊断安装失败', e); }

        // 预填导入元数据
        if (IMPORT_NAME) document.getElementById('topoName').value = IMPORT_NAME;
        if (IMPORT_CUSTOMER) document.getElementById('topoCustomer').value = IMPORT_CUSTOMER;
        if (IMPORT_REGION) document.getElementById('topoRegion').value = IMPORT_REGION;

        // 图标库由 iframe 的 clibs URL 参数加载（已生效）。

        if (IMPORT_TYPE === 'visio') {
            // Visio 导入：drawio 已从 &url= 加载文件，不发送 load（会覆盖）
            return;
        }
        if (IMPORT_TYPE === 'image' && IMPORT_URL) {
            // 图片导入：以底图方式加载，用户可在其上绘制
            var xml = '<mxGraphModel><root><mxCell id="0"/><mxCell id="1" parent="0"/>' +
                '<mxCell id="2" value="" style="shape=image;image=' + IMPORT_URL +
                ';imageAspect=0;opacity=70;" vertex="1" parent="1">' +
                '<mxGeometry x="0" y="0" width="800" height="600" as="geometry"/></mxCell>' +
                '</root></mxGraphModel>';
            post({action: 'load', xml: xml});
            return;
        }
        if (DIAGRAM_ID === 0) {
            var empty = '<mxGraphModel><root><mxCell id="0"/><mxCell id="1" parent="0"/></root></mxGraphModel>';
            post({action: 'load', xml: empty});
            return;
        }
        fetch('/topologies/api/diagram/' + DIAGRAM_ID)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.ok) { alert(data.error || '加载失败'); return; }
                document.getElementById('topoName').value = data.name || '';
                document.getElementById('topoDesc').value = data.description || '';
                if (data.customer_id) document.getElementById('topoCustomer').value = data.customer_id;
                if (data.region_id) document.getElementById('topoRegion').value = data.region_id;
                post({action: 'load', xml: data.diagram_xml || ''});
            })
            .catch(function(e) { alert('加载失败: ' + e); });
    }

    // ====== 保存 ======
    var btn = document.getElementById('btnSave');
    if (btn) btn.addEventListener('click', function() {
        setStatus('正在保存…');
        // drawio embed 模式的 action 分发链无 'save' 分支，post {action:'save'} 会被
        // 当作 unknownMessage 丢弃。改用 {action:'export', format:'xml'} 取当前图 XML，
        // 在 handleExport 里捕获 SAVE_FLAG 后走 doSave。XML 含 background/线条样式等全部状态。
        pendingExport = SAVE_FLAG;
        exportTotal = 0;
        post({action: 'export', format: 'xml', spin: false});
    });

    function doSave(xml) {
        var name = document.getElementById('topoName').value.trim();
        if (!name) { alert('请输入拓扑图名称'); setStatus(''); return; }
        fetch('/topologies/api/diagram', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                id: DIAGRAM_ID,
                name: name,
                description: document.getElementById('topoDesc').value,
                customer_id: parseInt(document.getElementById('topoCustomer').value) || null,
                region_id: parseInt(document.getElementById('topoRegion').value) || null,
                diagram_xml: xml
            })
        }).then(function(r) { return r.json(); })
          .then(function(data) {
              if (!data.ok) { alert(data.error || '保存失败'); setStatus('保存失败'); return; }
              DIAGRAM_ID = data.id;
              var isFirstSave = (document.getElementById('topoName').dataset.saved !== '1');
              document.getElementById('topoName').dataset.saved = '1';
              setStatus('已保存 ' + new Date().toLocaleTimeString('zh-CN', {hour12:false}));
              // 异步生成 PNG 缩略图。drawio embed 的 export action 仅支持 png/svg/xml/html/json，
              // 不支持 vsdx/pdf（会走默认 svg 分支并触发 graphReady 递归导致"非绘图文件"错误）。
              startExportQueue(['png']);
          })
          .catch(function(e) { alert('保存失败: ' + e); setStatus('保存失败'); });
    }

    // ====== 导出队列（顺序执行，避免 drawio 卡顿） ======
    function startExportQueue(formats) {
        exportQueue = formats.slice();
        exportTotal = exportQueue.length;
        updateExportStatus();
        processNextExport();
    }

    function processNextExport() {
        if (exportQueue.length === 0) {
            pendingExport = null;
            if (DIAGRAM_ID) setStatus('已保存 · 导出文件已更新');
            return;
        }
        pendingExport = exportQueue.shift();
        // spin:false 避免遮挡编辑器；导出在后台静默进行
        post({action: 'export', format: pendingExport, spin: false,
              scale: pendingExport === 'png' ? 0.3 : 1, border: 8});
    }

    function updateExportStatus() {
        if (exportQueue.length > 0 || pendingExport) {
            var done = exportTotal - exportQueue.length - (pendingExport ? 1 : 0);
            var fmt = pendingExport || exportQueue[0] || '';
            var label = {vsdx: 'Visio', pdf: 'PDF', png: '缩略图'}[fmt] || fmt;
            setStatus('<span class="export-progress"></span>已保存 · 生成' + label + '(' + done + '/' + exportTotal + ')', true);
        }
    }

    function handleExport(msg) {
        var fmt = msg.format;
        var data = msg.data;
        var justFinished = pendingExport;
        pendingExport = null;

        // 保存：export xml 返回的 XML 在 msg.xml（format=='xml' 时），走 doSave 存库
        if (justFinished === SAVE_FLAG) {
            var xml = msg.xml || data;
            if (xml) doSave(xml);
            else { alert('图内容为空，无法保存'); setStatus('保存失败'); }
            return;
        }

        if (!data) { processNextExport(); return; }

        // 上传到服务器（vsdx/pdf/png 统一接口）
        if (justFinished && justFinished !== 'svg') {
            fetch('/topologies/api/export-file', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: DIAGRAM_ID, format: justFinished, data: data})
            }).catch(function() { /* 导出失败不影响主流程 */ });
        }

        // 如果是用户手动导出（非队列），触发下载
        if (justFinished && exportTotal === 0) {
            downloadExport(data, fmt);
        } else {
            updateExportStatus();
            // 间隔 300ms 再处理下一个，给 drawio 喘息时间
            setTimeout(processNextExport, 300);
        }
    }

    // ====== 手动导出（顶栏下拉） ======
    document.querySelectorAll('.export-item').forEach(function(a) {
        a.addEventListener('click', function(e) {
            e.preventDefault();
            var fmt = this.dataset.fmt;
            // svg/png：embed export action 返回数据，宿主触发下载
            // pdf/vsdx：embed export action 不支持（走默认 svg 分支会触发递归），改用
            //           invokeAction 调 drawio 内部 exportPdf/exportVsdx（drawio 自行处理导出）
            if (fmt === 'pdf' || fmt === 'vsdx') {
                setStatus('正在导出 ' + fmt.toUpperCase() + '…（由 drawio 处理）', true);
                post({action: 'invokeAction', actionName: fmt === 'pdf' ? 'exportPdf' : 'exportVsdx'});
                return;
            }
            pendingExport = fmt;
            exportTotal = 0;  // 标记为手动导出（非队列）
            setStatus('正在导出 ' + fmt.toUpperCase() + '…', true);
            post({action: 'export', format: fmt, spin: true});
        });
    });

    function downloadExport(data, fmt) {
        var name = (document.getElementById('topoName').value || 'topology').trim();
        if (fmt === 'svg') {
            var blob = new Blob([data], {type: 'image/svg+xml'});
            downloadBlob(blob, name + '.svg');
        } else {
            var a = document.createElement('a');
            a.href = data;
            a.download = name + '.' + fmt;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    }

    function downloadBlob(blob, filename) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    }

    function setStatus(text, isHtml) {
        var el = document.getElementById('saveStatus');
        if (isHtml) el.innerHTML = text; else el.textContent = text;
    }

    // 导入模式提示
    if (IMPORT_URL) {
        document.getElementById('saveStatus').innerHTML =
            '<span class="text-warning"><i class="bi-exclamation-triangle"></i> 导入模式：保存后另存为新在线图</span>';
    }
})();
</script>
{% endblock %}
