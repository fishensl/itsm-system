{% extends "base.html" %}
{% block title %}修改密码 - IT运维综合管理系统{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-6 col-md-8">
        <div class="card">
            <div class="card-body">
                <div class="alert alert-info small mb-3">
                    <i class="bi-info-circle"></i> 当前账号：<strong>{{ current_user.username }}</strong>
                    {% if current_user.realname %}（{{ current_user.realname }}）{% endif %}
                    <br>
                    密码修改成功后将自动退出，请使用新密码重新登录。
                </div>
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">原密码 <span class="text-danger">*</span></label>
                        <input type="password" name="old_password" class="form-control" required autocomplete="current-password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码 <span class="text-danger">*</span></label>
                        <input type="password" name="new_password" class="form-control" required minlength="6" autocomplete="new-password">
                        <small class="text-muted">至少 6 位</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认新密码 <span class="text-danger">*</span></label>
                        <input type="password" name="confirm_password" class="form-control" required minlength="6" autocomplete="new-password">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary"><i class="bi-save"></i> 提交修改</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
