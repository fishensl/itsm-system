{% extends "base.html" %}
{% block title %}编辑用户 - IT运维综合管理系统{% endblock %}
{% block content %}
<div class="page-toolbar">
    <div class="actions">
        <a href="{{ url_for('user_list') }}" class="btn btn-outline-secondary btn-sm">
            <i class="bi-arrow-left"></i> 返回用户管理
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">用户名 <span class="text-danger">*</span></label>
                    <input type="text" name="username" class="form-control" required
                           value="{{ u.username }}">
                    <small class="text-muted">用户的唯一登录标识</small>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">真实姓名</label>
                    <input type="text" name="realname" class="form-control"
                           value="{{ u.realname or '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">角色 <span class="text-danger">*</span></label>
                    <select name="role" class="form-select">
                        <option value="operator" {% if u.role=='operator' %}selected{% endif %}>运维工程师</option>
                        <option value="sales" {% if u.role=='sales' %}selected{% endif %}>销售人员</option>
                        <option value="viewer" {% if u.role=='viewer' %}selected{% endif %}>查看者</option>
                        <option value="admin" {% if u.role=='admin' %}selected{% endif %}>系统管理员</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">所属部门</label>
                    <select name="department_id" class="form-select">
                        <option value="">-- 不指定 --</option>
                        {% for d in departments %}
                        <option value="{{ d.id }}" {% if u.department_id==d.id %}selected{% endif %}>
                            {{ d.name }}{% if d.parent %} ({{ d.parent.name }}){% endif %}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">密码（留空不修改）</label>
                    <input type="password" name="password" class="form-control" placeholder="留空不修改" autocomplete="off">
                </div>
                <div class="col-md-6 mb-3 d-flex align-items-end">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="is_active" value="1" id="is_active"
                               {% if u.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">启用</label>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">手机号码</label>
                    <input type="text" name="phone" class="form-control" value="{{ u.phone or '' }}" placeholder="13812345678">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">邮箱</label>
                    <input type="email" name="email" class="form-control" value="{{ u.email or '' }}" placeholder="user@example.com">
                </div>
                <div class="col-12 mb-3">
                    <label class="form-label">资质证书（可多选）</label>
                    {% set current_certs = u.cert_list() %}
                    <div class="border rounded p-2">
                        {% for grp in CERT_CATEGORIES %}
                        <div class="mb-2">
                            <strong class="text-primary">{{ grp.group }}</strong>
                            <div class="row g-2 mt-1">
                                {% for v in grp['items'] %}
                                <div class="col-md-4 col-sm-6">
                                    <label class="form-check">
                                        <input class="form-check-input" type="checkbox" name="certifications" value="{{ v }}"
                                               {% if v in current_certs %}checked{% endif %}>
                                        <span class="form-check-label">{{ v }}</span>
                                    </label>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
            <hr>
            <div class="d-flex justify-content-between">
                <a href="{{ url_for('user_list') }}" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary"><i class="bi-save"></i> 保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
