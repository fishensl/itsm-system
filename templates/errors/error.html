{% extends "base.html" %}
{% block title %}{{ code }} - {{ title }} · IT运维管理系统{% endblock %}
{% block content %}
<div class="error-page text-center" style="padding:80px 20px;">
    <div style="font-size:96px; font-weight:800; line-height:1;
        background:linear-gradient(135deg, #2563eb, #06b6d4);
        -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        background-clip:text; margin-bottom:16px;">{{ code }}</div>
    <h2 style="margin-bottom:12px; color:var(--gray-800);">{{ title }}</h2>
    <p class="text-muted mb-4">{{ message }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">
        <i class="bi-house me-1"></i> 返回工作台
    </a>
    {% if show_back %}
    <a href="javascript:history.back()" class="btn btn-outline-secondary ms-2">
        <i class="bi-arrow-left me-1"></i> 返回上一页
    </a>
    {% endif %}
</div>
{% endblock %}
